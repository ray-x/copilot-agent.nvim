name: Go

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/go.yml'
  pull_request:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/go.yml'

jobs:
  go:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    strategy:
      fail-fast: false
      matrix:
        check: [vet, fmt, test, build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum

      - name: go vet
        if: matrix.check == 'vet'
        run: go vet ./...

      - name: go fmt
        if: matrix.check == 'fmt'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        if: matrix.check == 'test'
        run: go test -race -count=1 ./...

      - name: go build
        if: matrix.check == 'build'
        run: go build -o /dev/null ./...
